<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disease Result - CropHealth</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">🌾 CropHealth</div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/upload">Upload</a></li>
                <li><a href="/history">History</a></li>
            </ul>
        </div>
    </nav>

    <div class="container result-container">
        <div class="result-section" id="resultSection" style="display:none;">
            <h1>Detection Result</h1>

            <div class="result-grid">
                <div class="result-image">
                    <img id="resultImg" src="" alt="Uploaded leaf">
                </div>

                <div class="result-info">
                    <div class="disease-card">
                        <div class="severity-badge" id="severityBadge"></div>
                        <h2 id="diseaseName"></h2>
                        <div class="confidence">
                            <span>Confidence: </span>
                            <span id="confidence"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="disease-details">
                <h3>Disease Information</h3>
                <div class="details-grid">
                    <div class="detail-item">
                        <h4>📝 Description</h4>
                        <p id="description"></p>
                    </div>
                    <div class="detail-item">
                        <h4>⚠️ Symptoms</h4>
                        <p id="symptoms"></p>
                    </div>
                    <div class="detail-item">
                        <h4>🛡️ Prevention Tips</h4>
                        <p id="prevention"></p>
                    </div>
                    <div class="detail-item">
                        <h4>💊 Suggested Treatment</h4>
                        <p id="treatment"></p>
                    </div>
                    <div class="detail-item">
                        <h4>⏱️ Duration</h4>
                        <p id="duration"></p>
                    </div>
                    <div class="detail-item">
                        <h4>🌱 Fertilizer</h4>
                        <p id="fertilizer"></p>
                    </div>
                </div>
            </div>

            <div class="action-buttons">
                <a href="/upload" class="btn btn-primary">Analyze Another</a>
                <a href="/history" class="btn btn-secondary">View History</a>
            </div>
        </div>

        <div class="error" id="error" style="display:none;"></div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2024 Smart Crop Disease Detection System. All rights reserved.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
